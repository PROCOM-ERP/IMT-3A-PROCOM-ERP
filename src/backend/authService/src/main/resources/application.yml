server:
  port: ${BACKEND_AUTH_SERVICE_PORT_INT}
  ssl:
    key-store: /${BACKEND_AUTH_SERVICE_HTTPS_KEY_STORE}
    key-store-password: ${BACKEND_AUTH_SERVICE_HTTPS_KEY_STORE_PASSWORD}
    keyStoreType: PKCS12
    keyAlias: ${BACKEND_AUTH_SERVICE_HTTPS_KEY_STORE_ALIAS}

spring:
  application:
    name: ${BACKEND_AUTH_SERVICE_HOSTNAME}
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_AUTH_SERVICE_HOSTNAME}:${DB_AUTH_SERVICE_PORT_INT}/${DB_AUTH_SERVICE_DB}
    username: ${DB_AUTH_SERVICE_USER}
    password: ${DB_AUTH_SERVICE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  database-platform: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  api-docs:
    path: /api/docs/v1/info
  swagger-ui:
    path: /api/docs/v1/swagger

security:
  jwt:
    secretkey: MpoUIF+TE2QFX88Z3lliMeqqIX++xABtsIVJwTqE0fs=
    rolekey: role

# logging:
#   level:
#     com.example.authservice: INFO

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://${BACKEND_DISCOVERY_SERVICE_HOSTNAME}:${BACKEND_DISCOVERY_SERVICE_PORT_INT}/eureka
